<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Resporg Editor{% endblock %}</title>
  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --bg: #fafafa;
      --card: #fff;
      --border: #ddd;
      --accent: #0b5fff;
      --warn: #a33;
      --ok: #0a7a3b;
    }
    * { box-sizing: border-box; }
    body {
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      color: #fff;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header a { color: #fff; text-decoration: none; }
    header .brand { font-weight: 600; }
    header .warn { color: #ffb199; margin-left: auto; font-size: 12px; }
    header .ok { color: #9fd8b4; margin-left: auto; font-size: 12px; }
    main { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 14px;
    }
    h1 { font-size: 20px; margin: 0 0 10px 0; }
    h2 { font-size: 16px; margin: 0 0 8px 0; }
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }
    .filters label { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); }
    .filters input, .filters select {
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
      min-width: 160px;
    }
    .filters button {
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .filters .reset {
      background: #eee;
      color: #333;
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 4px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 7px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    tr:hover { background: #f4f7ff; }
    .mono { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; }
    .tag {
      display: inline-block;
      background: #eef;
      color: #336;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 3px;
    }
    .tag.hidden { background: #fdd; color: #a33; }
    .pill-hidden { color: var(--warn); font-weight: 600; font-size: 12px; }
    .pill-ok { color: var(--ok); font-size: 12px; }
    .row-link { text-decoration: none; color: var(--accent); }

    /* edit page */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-weight: 600; margin-bottom: 4px; }
    .field input[type=text], .field textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: inherit;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px 16px;
    }
    .cat-grid label { font-weight: 400; }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-back {
      background: #eee;
      color: #333;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .flash-ok { background: #e6f6ec; border: 1px solid #b6dfc3; color: var(--ok); padding: 10px; border-radius: 4px; margin-bottom: 12px; }
    .flash-err { background: #fbe9e9; border: 1px solid #e3b8b8; color: var(--warn); padding: 10px; border-radius: 4px; margin-bottom: 12px; }
    .meta { color: var(--muted); font-size: 12px; margin: 4px 0; }
  </style>
</head>
<body>
<header>
  <span class="brand">Resporg Editor</span>
  <a href="{{ url_for('index') }}">List</a>
  <a href="{{ url_for('refresh') }}">Refresh data</a>
  {% if token_ok %}
    <span class="ok">Sanity token: OK</span>
  {% else %}
    <span class="warn">Sanity token MISSING — saves will fail</span>
  {% endif %}
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
