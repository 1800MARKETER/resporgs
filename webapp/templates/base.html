<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Resporgs.com — Toll-free RespOrg directory{% endblock %}</title>
  {% block robots %}<meta name="robots" content="index,follow">{% endblock %}
  <link rel="stylesheet" href="/static/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand">Resporgs.com</a>
    <nav class="nav">
      <a href="/directory">Directory</a>
      <a href="/categories">Categories</a>
      <a href="/groups">Groups</a>
      <a href="/number">Number lookup</a>
      <a href="/transferring">Transferring #s</a>
      <a href="/watch">Watch</a>
      <a href="/faq">FAQ</a>
    </nav>
    <form action="/search" method="get" class="search">
      <input type="text" name="q" placeholder="Search — name, code, alias…" value="{{ q or '' }}">
      <button type="submit">Search</button>
    </form>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>Data through {{ month }} · {{ total_resporgs or '?' }} resporgs tracked</small>
  </footer>
</body>
</html>
